# RangeFunction (generate_series) aliased in FROM — its presence marks the
# local source unresolved; a bare `n` in WHERE no longer falls through to
# an outer scope and cannot cause a false positive against a same-named
# outer column. Structural regression: must PASS (no advice, no panic).
- statement: SELECT * FROM tech_book t, generate_series(1, 10) AS s(n) WHERE s.n = t.id;

# ---- Codex P2 round-4 regression ------------------------------------------

# Correlated outer ref + inner JOIN with subquery in ON predicate. Previously
# localHasUnresolvedSources set localUnresolved=true because of the ON
# subquery, suppressing the outer-scope fallback in isIndexed for unqualified
# refs. The fix walks only SOURCE positions (Larg/Rarg/top-level FROM items)
# when determining unresolved-ness.
- statement: |
    SELECT * FROM tech_book WHERE id IN (
      SELECT 1 FROM no_index_table n
        JOIN products p ON p.price > (SELECT MIN(price) FROM products)
      WHERE UPPER(name) = 'X'
    );
  want:
    - status: 2
      code: 234
      title: STATEMENT_WHERE_DISALLOW_FUNCTIONS_AND_CALCULATIONS
      content: "Function \"UPPER\" is applied to indexed column \"name\" in the WHERE clause, which prevents index usage"
      startposition:
        line: 4
        column: 0
      endposition: null

# Codex round-8 P2 (#3104316972): CTE name shadows base table.
# `WITH orders AS (...)` makes the inner FROM `orders` refer to the CTE
# (which has no indexes), NOT the real `orders` table. Previously the
# rule attached real-`orders` indexes to the CTE alias and falsely
# flagged UPPER(customer_name). With CTE shadowing, the local scope is
# unresolved (CTE is opaque) and the rule no longer falsely flags.
- statement: |
    WITH orders AS (SELECT 1 AS customer_name)
    SELECT * FROM orders WHERE UPPER(customer_name) = 'X';

# Codex round-9 P2 (#3104448555): sibling CTE shadowing within same WITH.
# `c2`'s body references `orders` — should resolve as the EARLIER sibling
# CTE (no indexes), NOT the base orders table. Previously the rule walked
# c2's body before pushing CTE names, so `FROM orders` resolved as the
# real table and falsely flagged UPPER(customer_name).
- statement: |
    WITH orders AS (SELECT 1 AS customer_name),
         c2 AS (SELECT * FROM orders WHERE UPPER(customer_name) = 'X')
    SELECT * FROM c2;

# Codex round-14 P2 (#3104564086): non-recursive WITH visibility ordering.
# Earlier CTE `a` references base `orders` (real indexed table).
# Later CTE `orders` is a same-named CTE. Per SQL, `a` cannot see `orders`
# the CTE (it's defined later, non-recursive WITH). So `FROM orders` in
# `a` must resolve to the REAL orders table — and the UPPER(customer_name)
# violation must still flag.
- statement: |
    WITH a AS (SELECT * FROM orders WHERE UPPER(customer_name) = 'X'),
         orders AS (SELECT 1 AS dummy)
    SELECT * FROM a;
  want:
    - status: 2
      code: 234
      title: STATEMENT_WHERE_DISALLOW_FUNCTIONS_AND_CALCULATIONS
      content: "Function \"UPPER\" is applied to indexed column \"customer_name\" in the WHERE clause, which prevents index usage"
      startposition:
        line: 1
        column: 0
      endposition: null

# Codex round-15 P2 (#3104607277): recursive WITH self-reference must
# resolve to opaque CTE, NOT to a same-named base table. Without the fix,
# the recursive arm's `FROM cte` resolved to a base table, which (if
# happens to have indexed columns) emits false-positive advice attaching
# real indexes to CTE columns. With push-before-each, the CTE name is
# visible during its own body walk → opaque → no false positive.
- statement: |
    WITH RECURSIVE orders AS (
      SELECT order_id, customer_name FROM orders WHERE order_id = 1
      UNION ALL
      SELECT order_id + 1, customer_name FROM orders WHERE order_id < 10
    )
    SELECT * FROM orders;
