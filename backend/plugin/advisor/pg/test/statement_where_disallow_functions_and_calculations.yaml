# Test: Function on value side should NOT flag
- statement: SELECT * FROM tech_book WHERE id = ABS(-5);

# Test: Function on non-indexed column should NOT flag
- statement: SELECT * FROM tech_book WHERE UPPER(creator) = 'test';

# Test: Calculation on non-indexed column should NOT flag
- statement: SELECT * FROM no_index_table WHERE col_a + 1 > 5;

# Test: Simple comparison should NOT flag
- statement: SELECT * FROM tech_book WHERE id = 1 AND name = 'test';

# Test: Table not in schema should NOT flag
- statement: SELECT * FROM unknown_table WHERE UPPER(col) = 'test';

# Test: Unary minus on non-indexed column should NOT flag
- statement: SELECT * FROM no_index_table WHERE -col_a > 5;

