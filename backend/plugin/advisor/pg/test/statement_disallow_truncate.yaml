# SQL review rule: STATEMENT_DISALLOW_TRUNCATE (PostgreSQL)
#
# Detection target: top-level TruncateStmt.
# Advice fires one-per-relation; CASCADE / RESTART IDENTITY modifiers append a
# suffix to the message. PG TRUNCATE is transactional, so the advice wording
# names only trigger-bypass as the hazard (unlike Oracle/MySQL/MSSQL).

# --- Positive cases ---

# Test: bare TRUNCATE TABLE with single relation
- statement: TRUNCATE TABLE techbook;
  changeType: 1
  want:
    - status: 2
      code: 257
      title: STATEMENT_DISALLOW_TRUNCATE
      content: 'TRUNCATE TABLE "techbook" is not allowed: TRUNCATE bypasses triggers. Unlike Oracle/MySQL/MSSQL, PG TRUNCATE is transactional and rolls back cleanly.'
      startposition:
        line: 1
        column: 0
      endposition: null

# Test: TABLE keyword elided (PG-legal shorthand)
- statement: TRUNCATE techbook;
  changeType: 1
  want:
    - status: 2
      code: 257
      title: STATEMENT_DISALLOW_TRUNCATE
      content: 'TRUNCATE TABLE "techbook" is not allowed: TRUNCATE bypasses triggers. Unlike Oracle/MySQL/MSSQL, PG TRUNCATE is transactional and rolls back cleanly.'
      startposition:
        line: 1
        column: 0
      endposition: null

# Test: schema-qualified relation name
- statement: TRUNCATE TABLE public.techbook;
  changeType: 1
  want:
    - status: 2
      code: 257
      title: STATEMENT_DISALLOW_TRUNCATE
      content: 'TRUNCATE TABLE "public.techbook" is not allowed: TRUNCATE bypasses triggers. Unlike Oracle/MySQL/MSSQL, PG TRUNCATE is transactional and rolls back cleanly.'
      startposition:
        line: 1
