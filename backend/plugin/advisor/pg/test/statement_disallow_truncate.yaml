# --- Negative cases (no advice expected) ---

# Test: DELETE is not TRUNCATE
- statement: DELETE FROM techbook WHERE id = 1;
  changeType: 1

# Test: TRUNCATE appearing as a string literal in SELECT must not fire
- statement: SELECT 'TRUNCATE TABLE foo' AS x;
  changeType: 1

# Test: DROP TABLE is a different statement type
- statement: DROP TABLE techbook;
  changeType: 1

# Test: plain INSERT/UPDATE are untouched
- statement: |-
    INSERT INTO techbook(id) VALUES (1);
    UPDATE techbook SET id = 2 WHERE id = 1;
  changeType: 1

# Test: CREATE TABLE with "truncate" in a column comment must not fire
- statement: |-
    CREATE TABLE logs(
      id int,
      msg text
    );
  changeType: 1
