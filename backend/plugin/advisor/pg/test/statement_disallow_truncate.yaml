# Test: CASCADE suffix appended when Behavior == DROP_CASCADE
- statement: TRUNCATE TABLE techbook CASCADE;
  changeType: 1
  want:
    - status: 2
      code: 257
      title: STATEMENT_DISALLOW_TRUNCATE
      content: 'TRUNCATE TABLE "techbook" is not allowed: TRUNCATE bypasses triggers. Unlike Oracle/MySQL/MSSQL, PG TRUNCATE is transactional and rolls back cleanly. CASCADE will wipe dependent tables.'
      startposition:
        line: 1
        column: 0
      endposition: null

# Test: RESTART IDENTITY suffix when RestartSeqs == true
- statement: TRUNCATE TABLE techbook RESTART IDENTITY;
  changeType: 1
  want:
    - status: 2
      code: 257
      title: STATEMENT_DISALLOW_TRUNCATE
      content: 'TRUNCATE TABLE "techbook" is not allowed: TRUNCATE bypasses triggers. Unlike Oracle/MySQL/MSSQL, PG TRUNCATE is transactional and rolls back cleanly. RESTART IDENTITY will reset owned sequences.'
      startposition:
        line: 1
        column: 0
      endposition: null

# Test: CASCADE + RESTART IDENTITY — both suffixes concatenate in fixed order
- statement: TRUNCATE TABLE techbook RESTART IDENTITY CASCADE;
  changeType: 1
  want:
    - status: 2
      code: 257
      title: STATEMENT_DISALLOW_TRUNCATE
      content: 'TRUNCATE TABLE "techbook" is not allowed: TRUNCATE bypasses triggers. Unlike Oracle/MySQL/MSSQL, PG TRUNCATE is transactional and rolls back cleanly. CASCADE will wipe dependent tables. RESTART IDENTITY will reset owned sequences.'
      startposition:
        line: 1
        column: 0
      endposition: null

# Test: CONTINUE IDENTITY — RestartSeqs == false, no RESTART suffix
- statement: TRUNCATE TABLE techbook CONTINUE IDENTITY;
  changeType: 1
  want:
    - status: 2
      code: 257
      title: STATEMENT_DISALLOW_TRUNCATE
