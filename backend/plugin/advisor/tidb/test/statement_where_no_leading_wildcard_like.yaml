    - status: 2
      code: 204
      title: STATEMENT_WHERE_NO_LEADING_WILDCARD_LIKE
      content: '"SELECT * FROM t WHERE a LIKE ''%abc'' ESCAPE ''\\''" uses leading wildcard LIKE'
      startposition:
