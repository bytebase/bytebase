# Pins omni's ATAddConstraint vs ATAddIndex split + ConstrUnique
# unification. Pingcap had three distinct constraint enums for the
# UNIQUE/UNIQUE KEY/UNIQUE INDEX syntactic forms; omni unifies them under
# ConstrUnique. The existing `ALTER TABLE ... ADD UNIQUE name` cases
# above hit the bare-UNIQUE form; these pin the UNIQUE INDEX and UNIQUE
# KEY variants, which omni routes through ATAddIndex (not
# ATAddConstraint).
