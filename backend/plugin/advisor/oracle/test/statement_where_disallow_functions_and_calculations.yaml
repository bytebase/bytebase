# ---- Codex P1 round-2 regression: Oracle empty-schema resolution ---------

# Oracle prod sync stores SchemaMetadata{Name: ""}. The rule must use "" as
# currentSchema (NOT the database name) to find tables. This test exercises
# both unqualified and database-qualified refs.
- statement: "SELECT * FROM TEST_DB.tech_book WHERE UPPER(name) = 'X'"
  want:
    - status: 2
      code: 234
      title: STATEMENT_WHERE_DISALLOW_FUNCTIONS_AND_CALCULATIONS
      content: 'Function "UPPER" is applied to indexed column "NAME" in the WHERE clause, which prevents index usage'
      startposition:
        line: 1
        column: 0
      endposition: null

# Codex round-13 P2 (#3104539932): owner-qualified Oracle refs must
# distinguish current-owner from cross-owner. Bytebase sync only stores
# the connected schema's objects, so `HR.tech_book` (HR != TEST_DB) has
# no metadata and we cannot reason about its indexes — the rule must NOT
# emit advice for cross-owner refs (would otherwise wrongly attach
# current-owner indexes). PASS case (no advice expected):
- statement: "SELECT * FROM HR.tech_book WHERE UPPER(name) = 'X'"

# Codex round-8 P2 (#3104316975): Oracle WITH-factoring name shadows base
# table. The CTE has no indexes, so what looks like an indexed-column
# violation against ORDERS is actually against the CTE result. Previously
# the rule attached real ORDERS indexes to the CTE alias and falsely
# flagged. With CTE shadowing, the CTE alias is opaque (unresolved) and
# the rule no longer falsely flags.
- statement: |
    WITH orders AS (SELECT 1 AS customer_name FROM dual)
    SELECT * FROM orders WHERE UPPER(customer_name) = 'X'

# Codex round-9 P2 (#3104448556): same sibling-CTE-shadowing fix, Oracle.
# C2 body references the prior factoring element ORDERS; it must resolve
# to the CTE (opaque), not the physical ORDERS table.
- statement: |
    WITH orders AS (SELECT 1 AS customer_name FROM dual),
         c2 AS (SELECT * FROM orders WHERE UPPER(customer_name) = 'X')
    SELECT * FROM c2

# Codex round-11 P2 (#3104501040): containsDerivedTable previously walked
# all children of From_clause including Join_on_part subqueries. A derived
# table inside a JOIN ON's nested subquery falsely marked the OUTER
# query's localUnresolved=true, suppressing outer-scope fallback for
# unqualified correlated refs. Now mirrors PG's hasOpaqueSource by
# skipping Join_on_part subtrees.
- statement: |
    SELECT * FROM tech_book t WHERE EXISTS (
      SELECT 1 FROM no_index_table n
      INNER JOIN products p ON p.product_id = (SELECT y.id FROM (SELECT id FROM tech_book) y)
      WHERE UPPER(name) = 'X'
    )
  want:
    - status: 2
      code: 234
      title: STATEMENT_WHERE_DISALLOW_FUNCTIONS_AND_CALCULATIONS
      content: 'Function "UPPER" is applied to indexed column "NAME" in the WHERE clause, which prevents index usage'
      startposition:
        line: 4
        column: 0
      endposition: null

