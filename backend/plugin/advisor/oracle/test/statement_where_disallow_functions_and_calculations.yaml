# ---- Codex P1 regression: depth balance across nested contexts -----------

# INSERT ... SELECT source contains a Select_statement nested inside the
# Insert_statement. Previously OnEnter skipped the increment on the nested
# Select_statement while OnExit still decremented, leaving depth at 0 mid-
# statement. The fix makes both events unconditional — depth stays at 1
# throughout, guarding against any potential re-dispatch.
- statement: |
    INSERT INTO insert_target (id, name)
    SELECT id, name FROM tech_book WHERE UPPER(name) = 'X'
  want:
    - status: 2
      code: 234
      title: STATEMENT_WHERE_DISALLOW_FUNCTIONS_AND_CALCULATIONS
      content: 'Function "UPPER" is applied to indexed column "NAME" in the WHERE clause, which prevents index usage'
      startposition:
        line: 2
        column: 0
      endposition: null

