# Codex round-15 P2 (#3104607277, Oracle): recursive factoring self-ref
# must resolve to opaque CTE (not same-named base table). Same shape as
# PG. Oracle has no explicit RECURSIVE keyword — recursion is detected
# by self-reference. Push-before-each makes self-ref opaque correctly.
- statement: |
    WITH orders (n, customer_name) AS (
      SELECT 1, customer_name FROM orders WHERE rownum <= 1
      UNION ALL
      SELECT n + 1, customer_name FROM orders WHERE n < 10
    )
    SELECT * FROM orders
