# SQL review rule: STATEMENT_WHERE_DISALLOW_FUNCTIONS_AND_CALCULATIONS
# Cases added incrementally per the TDD plan.

# ---- Basic WARN cases (function on indexed column) ----
- statement: "SELECT * FROM tech_book WHERE UPPER(name) = 'test'"
  want:
    - status: 2
      code: 234
      title: STATEMENT_WHERE_DISALLOW_FUNCTIONS_AND_CALCULATIONS
      content: 'Function "UPPER" is applied to indexed column "NAME" in the WHERE clause, which prevents index usage'
      startposition:
        line: 1
        column: 0
      endposition: null

- statement: "SELECT * FROM tech_book WHERE MOD(id, 2) = 0"
  want:
    - status: 2
      code: 234
      title: STATEMENT_WHERE_DISALLOW_FUNCTIONS_AND_CALCULATIONS
      content: 'Function "MOD" is applied to indexed column "ID" in the WHERE clause, which prevents index usage'
      startposition:
        line: 1
        column: 0
      endposition: null

