# Regression tests for T-SQL query span extraction fixes
# These tests ensure that fixes for specific user-reported issues continue to work

- description: Test VIEW with table alias - fix for BYT-7974 column resolution issue
  statement: |-
    SELECT a.ProductID FROM v_CMS_HMNUM_FUll a WHERE a.ProductID = 1
  defaultDatabase: byt7974
  ignoreCaseSensitive: true
  metadata:
    - |-
      {
        "name": "byt7974",
        "schemas": [
          {
            "name": "dbo",
            "views": [
              {
                "name": "v_CMS_HMNUM_FUll",
                "definition": "CREATE VIEW [dbo].[v_CMS_HMNUM_FUll] AS SELECT ProductID, HMNUM FROM CMS_HMNUM"
              }
            ],
            "tables": [
              {
                "name": "CMS_HMNUM",
                "columns": [
                  {
                    "name": "ProductID"
                  },
                  {
                    "name": "HMNUM"
                  }
                ]
              }
            ]
          }
        ]
      }
  querySpan:
    type: 1
    results:
      - name: ProductID
        sourcecolumns:
          - server: ""
            database: byt7974
            schema: dbo
            table: CMS_HMNUM
            column: ProductID
        isplainfield: true
        sourcefieldpaths: []
        selectasterisk: false
    sourcecolumns:
      - server: ""
        database: byt7974
        schema: dbo
        table: v_CMS_HMNUM_FUll
        column: ""
    predicatecolumns:
      - server: ""
        database: byt7974
        schema: dbo
        table: CMS_HMNUM
        column: ProductID

- description: Test VIEW with cross-database references - fix for database context switching
  statement: |-
    SELECT * FROM SecondDB..v_CrossDB_View JOIN TableA ON 1=1 WHERE IDA=IDB;
  defaultDatabase: MainDB
  ignoreCaseSensitive: true
  metadata:
    - |-
      {
        "name": "MainDB",
        "schemas": [
          {
            "name": "dbo", 
            "tables": [
              {
                "name": "TableA",
                "columns": [
                  {
                    "name": "IDA"
                  }
                ]
              }
            ]
          }
        ]
      }
    - |-
      {
        "name": "SecondDB",
        "schemas": [
          {
            "name": "dbo", 
            "views": [
              {
                "name": "v_CrossDB_View",
                "definition": "CREATE VIEW [dbo].[v_CrossDB_View] AS SELECT IDB FROM TableB"
              }
            ],
            "tables": [
              {
                "name": "TableB",
                "columns": [
                  {
                    "name": "IDB"
                  }
                ]
              }
            ]
          }
        ]
      }
  querySpan:
    type: 1
    results:
      - name: IDB
        sourcecolumns:
          - server: ""
            database: SecondDB
            schema: dbo
            table: TableB
            column: IDB
        isplainfield: true
        sourcefieldpaths: []
        selectasterisk: false
      - name: IDA
        sourcecolumns:
          - server: ""
            database: MainDB
            schema: dbo
            table: TableA
            column: IDA
        isplainfield: true
        sourcefieldpaths: []
        selectasterisk: false
    sourcecolumns:
      - server: ""
        database: MainDB
        schema: dbo
        table: TableA
        column: ""
      - server: ""
        database: SecondDB
        schema: dbo
        table: v_CrossDB_View
        column: ""
    predicatecolumns:
      - server: ""
        database: MainDB
        schema: dbo
        table: TableA
        column: IDA
      - server: ""
        database: SecondDB
        schema: dbo
        table: TableB
        column: IDB

- description: "BYT-9235: WHERE clause on view column fails when CREATE VIEW has column alias list"
  statement: |-
    SELECT top 10 * FROM [bhs].[dbo].[vwTest] a WHERE a.F1 LIKE 'MT%'
  defaultDatabase: bhs
  ignoreCaseSensitive: true
  metadata:
    - |-
      {
        "name": "bhs",
        "schemas": [
          {
            "name": "dbo",
            "views": [
              {
                "name": "vwTest",
                "definition": "CREATE VIEW [dbo].[vwTest] (F1, F2) AS SELECT col_a, col_b FROM tbl",
                "columns": [
                  {
                    "name": "F1"
                  },
                  {
                    "name": "F2"
                  }
                ]
              }
            ],
            "tables": [
              {
                "name": "tbl",
                "columns": [
                  {
                    "name": "col_a"
                  },
                  {
                    "name": "col_b"
                  }
                ]
              }
            ]
          }
        ]
      }
  querySpan:
    type: 1
    results:
      - name: f1
        sourcecolumns:
          - server: ""
            database: bhs
            schema: dbo
            table: tbl
            column: col_a
        isplainfield: true
        sourcefieldpaths: []
        selectasterisk: false
      - name: f2
        sourcecolumns:
          - server: ""
            database: bhs
            schema: dbo
            table: tbl
            column: col_b
        isplainfield: true
        sourcefieldpaths: []
        selectasterisk: false
    sourcecolumns:
      - server: ""
        database: bhs
        schema: dbo
        table: vwTest
        column: ""
    predicatecolumns:
      - server: ""
        database: bhs
        schema: dbo
        table: tbl
        column: col_a

