peerDependencyRules:
  allowedVersions:
    typescript: '6'

overrides:
  # Patch transitive minimatch <5.1.8 reached through exceljs > archiver >
  # readdir-glob. The 5.x line has three high-severity ReDoS advisories
  # (GHSA-3ppc-4f35-3m26, GHSA-7r86-cg39-jmmj, GHSA-3vr3-vh78-x7vq) fixed
  # in 5.1.8+. exceljs's internal use is not user-controllable but the
  # advisory still trips Snyk. Scoped via parent so we don't disturb
  # archiver-utils' minimatch@3.x chain.
  readdir-glob>minimatch: ^5.1.9

allowBuilds:
  core-js: true
  esbuild: true
  # `pouchdb` pulls leveldown in transitively (leveldown@5.6.0 via
  # level@6.0.1, plus leveldown@6.1.1 directly) for Node-side use, but
  # the frontend only runs pouchdb in the browser via `level-js`/IndexedDB
  # — the native binding is never loaded at runtime. leveldown@5.6.0 is
  # deprecated and fails to build on Node 24 / Apple Silicon. Explicit
  # `false` opts out of the build without triggering pnpm 11's
  # ERR_PNPM_IGNORED_BUILDS error.
  leveldown: false
