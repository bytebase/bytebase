peerDependencyRules:
  allowedVersions:
    typescript: '6'

overrides:
  # Patch transitive minimatch <5.1.8 reached through exceljs > archiver >
  # readdir-glob. The 5.x line has three high-severity ReDoS advisories
  # (GHSA-3ppc-4f35-3m26, GHSA-7r86-cg39-jmmj, GHSA-3vr3-vh78-x7vq) fixed
  # in 5.1.8+. exceljs's internal use is not user-controllable but the
  # advisory still trips Snyk. Scoped via parent so we don't disturb
  # archiver-utils' minimatch@3.x chain.
  readdir-glob>minimatch: ^5.1.9
  # Patch transitive tmp@0.2.3 reached through exceljs. The 0.2.3 line is
  # vulnerable to a symlink attack via the `dir` parameter; fixed in 0.2.4+.
  # exceljs's internal use of tmp is for creating XLSX shared-strings temp
  # files on disk; in our browser bundle the temp paths are managed by
  # exceljs itself and not user-influenced, but the advisory still trips
  # Snyk. 0.2.x is API-stable, so the bump is drop-in.
  tmp: ^0.2.5
  # Force exceljs's archiver + unzipper to versions that drop the
  # glob@7 → inflight@1.0.6 transitive chain. inflight is unmaintained
  # with no published fix for its memory-leak advisory (CVSS 6.2).
  # archiver@7 uses archiver-utils@5 → glob@10 (no inflight); unzipper@0.12
  # uses fs-extra (no fstream/rimraf/glob@7 chain). Both retain the same
  # outer API exceljs consumes (Archiver.pipe / Open.file), so the bump
  # is drop-in — verified by the serializeXLSX tests.
  exceljs>archiver: ^7.0.0
  exceljs>unzipper: ^0.12.0

allowBuilds:
  core-js: true
  esbuild: true
  # `pouchdb` pulls leveldown in transitively (leveldown@5.6.0 via
  # level@6.0.1, plus leveldown@6.1.1 directly) for Node-side use, but
  # the frontend only runs pouchdb in the browser via `level-js`/IndexedDB
  # — the native binding is never loaded at runtime. leveldown@5.6.0 is
  # deprecated and fails to build on Node 24 / Apple Silicon. Explicit
  # `false` opts out of the build without triggering pnpm 11's
  # ERR_PNPM_IGNORED_BUILDS error.
  leveldown: false
