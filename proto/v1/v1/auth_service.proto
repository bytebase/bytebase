syntax = "proto3";

package bytebase.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "v1/annotation.proto";
import "v1/user_service.proto";

option go_package = "github.com/bytebase/bytebase/backend/generated-go/v1";

// AuthService handles user authentication operations.
service AuthService {
  // Authenticates a user and returns access tokens.
  // Permissions required: None
  rpc Login(LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/v1/auth/login"
      body: "*"
    };
    option (bytebase.v1.allow_without_credential) = true;
    option (bytebase.v1.audit) = true;
  }

  // Logs out the current user session.
  // Permissions required: None
  rpc Logout(LogoutRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/auth/logout"
      body: "*"
    };
    option (bytebase.v1.allow_without_credential) = true;
    option (bytebase.v1.audit) = true;
  }

  // Exchanges an external OIDC token for a Bytebase access token.
  // Used by CI/CD pipelines with Workload Identity Federation.
  // Permissions required: None (validates via OIDC token)
  rpc ExchangeToken(ExchangeTokenRequest) returns (ExchangeTokenResponse) {
    option (google.api.http) = {
      post: "/v1/auth:exchangeToken"
      body: "*"
    };
    option (bytebase.v1.allow_without_credential) = true;
    option (bytebase.v1.audit) = true;
  }

  // Registers a new user account. Creates a principal and assigns a workspace:
  // - If the user's email was pre-invited to a workspace, joins that workspace.
  // - Otherwise, creates a new workspace with the user as admin.
  // Returns access tokens so the user is logged in immediately after signup.
  rpc Signup(SignupRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/v1/auth/signup"
      body: "*"
    };
    option (bytebase.v1.allow_without_credential) = true;
    option (bytebase.v1.audit) = true;
  }

  // Refreshes the access token using the refresh token cookie.
  // Permissions required: None (validates via refresh token cookie)
  rpc Refresh(RefreshRequest) returns (RefreshResponse) {
    option (google.api.http) = {
      post: "/v1/auth/refresh"
      body: "*"
    };
    option (bytebase.v1.allow_without_credential) = true;
  }

  // Switches the current user's active workspace and issues new tokens.
  // The user must be a member of the target workspace.
  rpc SwitchWorkspace(SwitchWorkspaceRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/v1/auth:switchWorkspace"
      body: "*"
    };
    option (bytebase.v1.auth_method) = CUSTOM;
  }

  // Requests a password reset email for the given email address.
  // Always returns success to avoid leaking whether the email exists.
  // Permissions required: None
  rpc RequestPasswordReset(RequestPasswordResetRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/auth:requestPasswordReset"
      body: "*"
    };
    option (bytebase.v1.allow_without_credential) = true;
  }

  // Resets the user's password using a password reset token from email.
  // Permissions required: None (validates via token)
  rpc ResetPassword(ResetPasswordRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/auth:resetPassword"
      body: "*"
    };
    option (bytebase.v1.allow_without_credential) = true;
  }

  // Sends a 6-digit verification code to the email for login/signup.
  // Always returns success (no email enumeration). Enforces 60-sec resend cooldown.
  // Permissions required: None
  rpc SendEmailLoginCode(SendEmailLoginCodeRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/auth:sendEmailLoginCode"
      body: "*"
    };
    option (bytebase.v1.allow_without_credential) = true;
    option (bytebase.v1.audit) = true;
  }
}

message LoginRequest {
  // User's email address.
  string email = 1;

  // User's password for authentication.
  string password = 2;

  // If true, sets access token and refresh token as HTTP-only cookies instead of
  // returning the token in the response body. Use for browser-based clients.
  bool web = 3;

  // The name of the identity provider.
  // Format: idps/{idp}
  string idp_name = 4;

  // The idp_context is used to get the user information from identity provider.
  IdentityProviderContext idp_context = 5;

  // The otp_code is used to verify the user's identity by MFA.
  optional string otp_code = 6;

  // The recovery_code is used to recovery the user's identity with MFA.
  optional string recovery_code = 7;

  // The mfa_temp_token is used to verify the user's identity by MFA.
  optional string mfa_temp_token = 8;

  // 6-digit code from email for passwordless login/signup.
  // Pairs with `email`. Mutually exclusive with `password` and `idp_name`.
  optional string email_code = 9;

  // Preferred workspace to land in after login. If the user is a member of this
  // workspace, the token is issued for it; otherwise falls back to the default
  // resolution (last login workspace → first membership). Typically populated
  // from the ?workspace= query parameter in invite links.
  // Format: workspaces/{workspace}
  optional string workspace = 10;
}

// Context for identity provider authentication.
message IdentityProviderContext {
  oneof context {
    // OAuth2 authentication context.
    OAuth2IdentityProviderContext oauth2_context = 1;
    // OpenID Connect authentication context.
    OIDCIdentityProviderContext oidc_context = 2;
  }
}

// OAuth2 authentication context.
message OAuth2IdentityProviderContext {
  // Authorization code from OAuth2 provider.
  string code = 1;
}

// OpenID Connect authentication context.
message OIDCIdentityProviderContext {
  // Authorization code from OIDC provider.
  string code = 1;
}

message LoginResponse {
  // Access token for authenticated requests.
  // Only returned when web=false. For web=true, the token is set as an HTTP-only cookie.
  string token = 1;

  // Temporary token for MFA verification.
  optional string mfa_temp_token = 2;

  // Whether user must reset password before continuing.
  bool require_reset_password = 3;

  // The user from the successful login.
  User user = 4;
}

// Request to logout current user session.
message LogoutRequest {}

message ExchangeTokenRequest {
  // External OIDC token (JWT) from CI/CD platform.
  string token = 1;

  // Workload Identity email for identifying which identity to authenticate as.
  // Format: {name}@workload.bytebase.com
  string email = 2;
}

message ExchangeTokenResponse {
  // Bytebase access token.
  string access_token = 1;
}

message SignupRequest {
  // The email for the new account.
  string email = 1;

  // The password for the new account.
  string password = 2;

  // The display name of the user.
  string title = 3;
}

// Request to refresh the access token.
message RefreshRequest {}

// Response from refreshing the access token.
message RefreshResponse {}

message RequestPasswordResetRequest {
  // The email address of the account to reset.
  string email = 1;
  // Optional workspace context captured at send time, used to locate the EMAIL setting,
  // and later (at verify time) for signup gate checks and workspace assignment.
  // Unset for SaaS brand-new signup (no workspace exists yet).
  // Format: workspaces/{workspace}
  optional string workspace = 2;
}

message ResetPasswordRequest {
  // The email address of the account.
  string email = 1;
  // The 6-digit code from the reset email.
  string code = 2;
  // The new password to set.
  string new_password = 3;
}

message SendEmailLoginCodeRequest {
  // The email address to send the code to.
  string email = 1;
  // Optional workspace context captured at send time, used to locate the EMAIL setting,
  // and later (at verify time) for signup gate checks and workspace assignment.
  // Unset for SaaS brand-new signup (no workspace exists yet).
  // Format: workspaces/{workspace}
  optional string workspace = 2;
}

message SwitchWorkspaceRequest {
  // The target workspace to switch to.
  // Format: workspaces/{workspace}
  string workspace = 1;

  // If true, sets tokens as HTTP-only cookies (browser clients).
  bool web = 2;

  // OTP code for MFA verification. Required if the target workspace enforces MFA.
  optional string otp_code = 3;

  // Recovery code for MFA verification (alternative to otp_code).
  optional string recovery_code = 4;

  // Temporary MFA token from a previous SwitchWorkspace call that returned mfa_temp_token.
  optional string mfa_temp_token = 5;
}
