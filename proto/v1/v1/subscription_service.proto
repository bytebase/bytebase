syntax = "proto3";

package bytebase.v1;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "v1/annotation.proto";

option go_package = "github.com/bytebase/bytebase/backend/generated-go/v1";

// SubscriptionService manages enterprise subscriptions and licensing.
service SubscriptionService {
  // GetSubscription returns the current subscription.
  // If there is no license, we will return a free plan subscription without expiration time.
  // If there is expired license, we will return a free plan subscription with the expiration time of the expired license.
  rpc GetSubscription(GetSubscriptionRequest) returns (Subscription) {
    option (google.api.http) = {get: "/v1/subscription"};
    option (google.api.method_signature) = "";
  }

  // Uploads an enterprise license (self-hosted only).
  rpc UploadLicense(UploadLicenseRequest) returns (Subscription) {
    option (google.api.http) = {
      put: "/v1/subscription/license"
      body: "*"
    };
    option (bytebase.v1.permission) = "bb.subscription.manage";
    option (bytebase.v1.auth_method) = IAM;
  }

  // CreatePurchase creates a new subscription purchase (SaaS only).
  // Returns a Stripe Checkout URL for the user to complete payment.
  rpc CreatePurchase(CreatePurchaseRequest) returns (PurchaseResponse) {
    option (google.api.http) = {
      post: "/v1/subscription:purchase"
      body: "*"
    };
    option (bytebase.v1.permission) = "bb.subscription.manage";
    option (bytebase.v1.auth_method) = IAM;
  }

  // UpdatePurchase updates an existing subscription (SaaS only).
  // May return a Stripe Checkout URL if payment method change is needed.
  rpc UpdatePurchase(UpdatePurchaseRequest) returns (PurchaseResponse) {
    option (google.api.http) = {
      post: "/v1/subscription:updatePurchase"
      body: "*"
    };
    option (bytebase.v1.permission) = "bb.subscription.manage";
    option (bytebase.v1.auth_method) = IAM;
  }

  // CancelPurchase cancels an active subscription (SaaS only).
  rpc CancelPurchase(CancelPurchaseRequest) returns (PurchaseResponse) {
    option (google.api.http) = {
      post: "/v1/subscription:cancelPurchase"
      body: "*"
    };
    option (bytebase.v1.permission) = "bb.subscription.manage";
    option (bytebase.v1.auth_method) = IAM;
  }

  // GetPaymentInfo returns payment details for the current subscription (SaaS only).
  rpc GetPaymentInfo(GetPaymentInfoRequest) returns (PaymentInfo) {
    option (google.api.http) = {get: "/v1/subscription/paymentInfo"};
    option (bytebase.v1.permission) = "bb.subscription.manage";
    option (bytebase.v1.auth_method) = IAM;
  }

  // VerifyCheckoutSession verifies a Stripe Checkout Session status (SaaS only).
  rpc VerifyCheckoutSession(VerifyCheckoutSessionRequest) returns (VerifyCheckoutSessionResponse) {
    option (google.api.http) = {get: "/v1/subscription/checkoutSession/{session_id}"};
    option (bytebase.v1.permission) = "bb.subscription.manage";
    option (bytebase.v1.auth_method) = IAM;
  }

  // ListPurchasePlans returns available plans for self-service purchase.
  rpc ListPurchasePlans(ListPurchasePlansRequest) returns (ListPurchasePlansResponse) {
    option (google.api.http) = {get: "/v1/subscription/plans"};
  }
}

message GetSubscriptionRequest {}

message UploadLicenseRequest {
  string license = 1;
}

// Purchase messages

message CreatePurchaseRequest {
  PlanType plan = 1;
  BillingInterval interval = 2;
  int32 seats = 3;
}

message PurchaseResponse {
  // If set, redirect to this Stripe Checkout URL.
  // If empty, the update was applied directly using the existing payment method.
  string payment_url = 1;
  // Stripe Checkout Session ID. Used to verify the session after redirect.
  string session_id = 2;
}

message VerifyCheckoutSessionRequest {
  string session_id = 1;
}

message VerifyCheckoutSessionResponse {
  // Stripe Checkout Session status: "complete", "expired", or "open".
  string status = 1;
}

message UpdatePurchaseRequest {
  PlanType plan = 1;
  BillingInterval interval = 2;
  int32 seats = 3;
  string etag = 4;
}

message CancelPurchaseRequest {}

message GetPaymentInfoRequest {}

message PaymentInfo {
  string total_price = 1;
  string currency = 2;
  string period_start = 3;
  string period_end = 4;
  // Stripe Billing Portal URL for invoice management.
  string invoice_url = 5;
  // Whether the subscription is scheduled to cancel at the end of the current billing period.
  bool cancel_at_period_end = 6;
}

enum BillingInterval {
  BILLING_INTERVAL_UNSPECIFIED = 0;
  MONTH = 1;
  YEAR = 2;
}

message PurchasePlan {
  PlanType type = 1;
  bool self_service_purchase = 2;
  repeated PurchasePlanAdditional additionals = 3;
  repeated PurchaseBillingMethod billing_methods = 4;
}

message PurchasePlanAdditional {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    USER = 1;
  }
  Type type = 1;
  // Price in USD cents per month.
  int32 unit_price = 2;
  int32 free_count = 3;
  int32 minimum_count = 4;
  // -1 means unlimited.
  int32 maximum_count = 5;
}

message PurchaseBillingMethod {
  BillingInterval interval = 1;
  PurchaseDiscount discount = 2;
}

message PurchaseDiscount {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    PERCENTAGE_OFF = 1;
    FIXED_MONTH_OFF = 2;
    FIXED_PRICE_OFF = 3;
  }
  Type type = 1;
  int32 value = 2;
}

message ListPurchasePlansRequest {}

message ListPurchasePlansResponse {
  repeated PurchasePlan plans = 1;
}

// Existing types

enum PlanType {
  // Unspecified plan type.
  PLAN_TYPE_UNSPECIFIED = 0;

  // Free plan with basic features and no cost.
  FREE = 1;

  // Team plan with collaboration features for small to medium teams.
  TEAM = 2;

  // Enterprise plan with advanced features and dedicated support.
  ENTERPRISE = 3;
}

message Subscription {
  PlanType plan = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  int32 seats = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  int32 instances = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  int32 active_instances = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  google.protobuf.Timestamp expires_time = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  bool trialing = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  string org_name = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Whether high availability (multiple replicas) is enabled.
  bool ha = 8 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// PlanFeature represents the available features in Bytebase
enum PlanFeature {
  FEATURE_UNSPECIFIED = 0;

  // Database Change Management
  FEATURE_DATABASE_CHANGE = 1;
  FEATURE_GIT_BASED_SCHEMA_VERSION_CONTROL = 2;
  FEATURE_DECLARATIVE_SCHEMA_MIGRATION = 3;
  FEATURE_COMPARE_AND_SYNC_SCHEMA = 4;
  FEATURE_ONLINE_SCHEMA_CHANGE = 5;
  FEATURE_PRE_DEPLOYMENT_SQL_REVIEW = 6;
  FEATURE_AUTOMATIC_BACKUP_BEFORE_DATA_CHANGES = 7;
  FEATURE_ONE_CLICK_DATA_ROLLBACK = 8;
  FEATURE_MULTI_DATABASE_BATCH_CHANGES = 9;
  FEATURE_PROGRESSIVE_ENVIRONMENT_DEPLOYMENT = 10;
  FEATURE_SCHEDULED_ROLLOUT_TIME = 11;
  FEATURE_DATABASE_CHANGELOG = 12;
  FEATURE_SCHEMA_DRIFT_DETECTION = 13;
  FEATURE_ROLLOUT_POLICY = 14;

  // SQL Editor & Development
  FEATURE_WEB_BASED_SQL_EDITOR = 15;
  FEATURE_SQL_EDITOR_ADMIN_MODE = 16;
  FEATURE_NATURAL_LANGUAGE_TO_SQL = 17;
  FEATURE_AI_QUERY_EXPLANATION = 18;
  FEATURE_AI_QUERY_SUGGESTIONS = 19;
  FEATURE_AUTO_COMPLETE = 20;
  FEATURE_SCHEMA_DIAGRAM = 21;
  FEATURE_SCHEMA_EDITOR = 22;
  FEATURE_DATA_EXPORT = 23;
  FEATURE_DATA_OFFLINE_EXPORT = 24;
  FEATURE_QUERY_HISTORY = 25;
  FEATURE_SAVED_AND_SHARED_SQL_SCRIPTS = 26;
  FEATURE_BATCH_QUERY = 27;
  FEATURE_INSTANCE_READ_ONLY_CONNECTION = 28;
  FEATURE_QUERY_POLICY = 29;
  FEATURE_RESTRICT_COPYING_DATA = 30;

  // Security & Compliance
  FEATURE_IAM = 31;
  FEATURE_INSTANCE_SSL_CONNECTION = 32;
  FEATURE_INSTANCE_CONNECTION_OVER_SSH_TUNNEL = 33;
  FEATURE_INSTANCE_CONNECTION_IAM_AUTHENTICATION = 34;
  FEATURE_GOOGLE_AND_GITHUB_SSO = 35;
  FEATURE_USER_GROUPS = 36;
  FEATURE_DISALLOW_SELF_SERVICE_SIGNUP = 37;
  FEATURE_CUSTOM_INSTANCE_SYNC_TIME = 38;
  FEATURE_CUSTOM_INSTANCE_CONNECTION_LIMIT = 39;
  FEATURE_RISK_ASSESSMENT = 40;
  FEATURE_APPROVAL_WORKFLOW = 41;
  FEATURE_AUDIT_LOG = 42;
  FEATURE_ENTERPRISE_SSO = 43;
  FEATURE_TWO_FA = 44;
  FEATURE_PASSWORD_RESTRICTIONS = 45;
  FEATURE_DISALLOW_PASSWORD_SIGNIN = 46;
  FEATURE_CUSTOM_ROLES = 47;
  FEATURE_REQUEST_ROLE_WORKFLOW = 48;
  FEATURE_JIT = 49;
  FEATURE_DATA_MASKING = 50;
  FEATURE_DATA_CLASSIFICATION = 51;
  FEATURE_SCIM = 52;
  FEATURE_DIRECTORY_SYNC = 53;
  FEATURE_TOKEN_DURATION_CONTROL = 54;
  FEATURE_EXTERNAL_SECRET_MANAGER = 55;
  FEATURE_USER_EMAIL_DOMAIN_RESTRICTION = 56;

  // Administration & Support
  FEATURE_PROJECT_MANAGEMENT = 57;
  FEATURE_ENVIRONMENT_MANAGEMENT = 58;
  FEATURE_IM_NOTIFICATIONS = 59;
  FEATURE_TERRAFORM_PROVIDER = 60;
  FEATURE_DATABASE_GROUPS = 61;
  FEATURE_ENVIRONMENT_TIERS = 62;
  FEATURE_DASHBOARD_ANNOUNCEMENT = 63;
  FEATURE_API_INTEGRATION_GUIDANCE = 64;
  FEATURE_CUSTOM_LOGO = 65;
  FEATURE_WATERMARK = 66;
  FEATURE_ROADMAP_PRIORITIZATION = 67;
  FEATURE_CUSTOM_MSA = 68;
  FEATURE_COMMUNITY_SUPPORT = 69;
  FEATURE_EMAIL_SUPPORT = 70;
  FEATURE_DEDICATED_SUPPORT_WITH_SLA = 71;
}

// PlanConfig represents the configuration for all plans loaded from plan.yaml
message PlanConfig {
  repeated PlanLimitConfig plans = 1;
  repeated PlanFeature instance_features = 2;
}

// PlanLimitConfig represents a single plan's configuration
message PlanLimitConfig {
  PlanType type = 1;
  int32 maximum_instance_count = 2;
  int32 maximum_seat_count = 3;
  repeated PlanFeature features = 4;
}
