syntax = "proto3";

package bytebase.v1;

import "google/api/expr/v1alpha1/syntax.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/type/expr.proto";

option go_package = "github.com/bytebase/bytebase/backend/generated-go/v1";

// Request message for getting an IAM policy.
message GetIamPolicyRequest {
  // The name of the resource to get the IAM policy.
  // Format: projects/{project}
  // Format: workspaces/{workspace}
  string resource = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "bytebase.com/IAMPolicy"}
  ];
}

// Request message for setting an IAM policy.
message SetIamPolicyRequest {
  // The name of the resource to set the IAM policy.
  // Format: projects/{project}
  // Format: workspaces/{workspace}
  string resource = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "bytebase.com/IAMPolicy"}
  ];

  IamPolicy policy = 2 [(google.api.field_behavior) = REQUIRED];

  // The current etag of the policy.
  string etag = 3;
}

// IAM policy that binds members to roles.
message IamPolicy {
  // Collection of binding.
  // A binding binds one or more project members to a single project role.
  repeated Binding bindings = 1;

  // The current etag of the policy.
  // If an etag is provided and does not match the current etag of the policy,
  // the call will be blocked and an ABORTED error will be returned.
  string etag = 2;
}

// Binding associates members with a role and optional conditions.
message Binding {
  // The role that is assigned to the members.
  // Format: roles/{role}
  string role = 1;

  // Specifies the principals requesting access for a Bytebase resource.
  // For users, the member should be: user:{email}
  // For groups, the member should be: group:{email}
  // For service accounts, the member should be: serviceAccount:{email}
  // For workload identities, the member should be: workloadIdentity:{email}
  repeated string members = 2;

  // The condition that is associated with this binding, only used in the project IAM policy.
  // If the condition evaluates to true, then this binding applies to the current request.
  // If the condition evaluates to false, then this binding does not apply to the current request. However, a different role binding might grant the same role to one or more of the principals in this binding.
  // The syntax and semantics of CEL are documented at https://github.com/google/cel-spec
  //
  // Support variables:
  // resource.database: the database full name in "instances/{instance}/databases/{database}" format, used by any role with SQL Editor read (e.g. "roles/sqlEditorUser", "roles/sqlEditorReadUser") or write (bb.sql.ddl / bb.sql.dml) access, support "==" operator.
  // resource.schema_name: the schema name, used by any role with SQL Editor read or write (bb.sql.ddl / bb.sql.dml) access; for writes it is evaluated per write-target table, support "==" operator.
  // resource.table_name: the table name, used by any role with SQL Editor read or write (bb.sql.ddl / bb.sql.dml) access; for writes it is evaluated per write-target table, support "==" operator.
  // resource.environment_id: the environment to allow the DDL/DML operation in the SQL Editor, only works for the role with bb.sql.ddl or bb.sql.dml permissions. Support "in" operator.
  // request.time: the expiration. Only support "<" operation in `request.time < timestamp("{ISO datetime string format}")`.
  //
  // Known limitations of table/schema-scoped DDL/DML grants:
  // - The scope only gates the write target, not the read sources of a write: e.g. `INSERT INTO granted_table SELECT * FROM other_table` may read `other_table` without a grant on it, so a table-scoped write grant is not an exfiltration boundary.
  // - It must be paired with a database/project-level read grant: a table-scoped grant alone does not satisfy the SQL Editor query method permission (bb.databases.get).
  // - A resource.schema_name-scoped grant only authorizes a write whose schema is unambiguous — qualify the table (schema.table) or select the schema for the SQL Editor session. An unqualified write whose effective schema cannot be determined ahead of execution is denied (qualify it, or use a table-only grant).
  // - Multi-statement batches fall back to a database-level check (a statement could change the session schema mid-batch), so multi-statement DDL/DML requires a database-level grant.
  // - Enforcement is on the statement's literal write target; writes routed elsewhere by a view/synonym, or into a temporary schema (e.g. pg_temp), are evaluated against what the statement names, not the ultimate base object.
  // - Only writes whose target the resolver models as a base table are table/schema-scopable (INSERT/UPDATE/DELETE/TRUNCATE and table-level CREATE/DROP/ALTER/RENAME/index). Other writes — MERGE, COPY ... FROM, CREATE TABLE AS, and DDL on non-table objects (views, functions, procedures, sequences) — fall back to a database-level check and require a database-level grant.
  //
  // For example:
  // resource.database == "instances/local-pg/databases/postgres" && resource.schema_name in ["public","another_schema"]
  // resource.database == "instances/local-pg/databases/bytebase" && resource.schema_name == "public" && resource.table_name in ["audit_log"]
  // resource.database == "instances/local-pg/databases/postgres" && resource.environment_id in ["test"]
  // request.time < timestamp("2025-04-26T11:24:48.655Z")
  google.type.Expr condition = 3;

  // The parsed expression of the condition.
  google.api.expr.v1alpha1.Expr parsed_expr = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Describes changes between two IAM policies.
message PolicyDelta {
  // The delta for Bindings between two policies.
  repeated BindingDelta binding_deltas = 1;
}

// A single change to a binding.
message BindingDelta {
  // Type of action performed on a binding.
  enum Action {
    // Unspecified action.
    ACTION_UNSPECIFIED = 0;
    // Add a binding.
    ADD = 1;
    // Remove a binding.
    REMOVE = 2;
  }

  // The action that was performed on a Binding.
  Action action = 1;

  // Role that is assigned to `members`.
  // For example, `roles/projectOwner`.
  string role = 2;

  // Follows the same format of Binding.members.
  string member = 3;

  // The condition that is associated with this binding.
  google.type.Expr condition = 4;
}
